name: Build & Type Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-workbench:
    name: Type Check — Workbench App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pcf-workbench/workbench-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: pcf-workbench/workbench-app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build-workbench:
    name: Build — Workbench App
    runs-on: ubuntu-latest
    needs: typecheck-workbench
    defaults:
      run:
        working-directory: pcf-workbench/workbench-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: pcf-workbench/workbench-app/package-lock.json
      - run: npm ci
      - run: npm run build

  build-pcf-samples:
    name: Build — PCF Samples
    runs-on: windows-latest
    strategy:
      matrix:
        control:
          - ContactCardControl
          - DocumentViewer
          - HierarchicalTree
          - KPIDashboard
          - SmartLookup
          - TimelineFeed
    defaults:
      run:
        working-directory: pcf-workbench/pcf-samples/${{ matrix.control }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: pcf-workbench/pcf-samples/${{ matrix.control }}/package-lock.json
      - run: npm ci
      - run: npm run build
